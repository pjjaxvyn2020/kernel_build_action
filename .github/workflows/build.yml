name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Start Linker Fixer Daemon
        run: |
          (
            echo "Watcher started. Waiting for toolchain..."
            while true; do
              if [ -f "/home/runner/clang/bin/ld" ]; then
                echo "Conflicting linker found! Deleting..."
                rm -f /home/runner/clang/bin/ld
                echo "Conflicting linker removed successfully."
                break
              fi
              sleep 1
            done
          ) &

      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/pjjaxvyn2020/moonbeam_gale_kernel
          kernel-branch: mb-gamma
          config: gale_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: false
          other-clang-url: https://github.com/kdrag0n/proton-clang
          other-clang-branch: master
          ksu: false
          ksu-version: main
          android-version: 12
          aosp-clang-version: r383902
          disable-lto: false
          anykernel3: false

      - name: Package Kernel Manually
        run: |
          # Clone AnyKernel3
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          
          # Copy your kernel and dtbo
          cp kernel/kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cp kernel/kernel/out/arch/arm64/boot/dts/mediatek/gale.dtbo AnyKernel3/dtbo.img
          
          # Update your anykernel.sh (or replace it with your custom one)
          # Make sure your anykernel.sh includes the flash_dtbo logic we discussed!
          
          # Create the zip
          zip -r9 AnyKernel3-flasher.zip AnyKernel3/*
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-flasher
          path: AnyKernel3-flasher.zip
